version: "3"

vars:
  BINARY_NAME: matrix
  INSTALL_DIR: /usr/local/bin

tasks:
  default:
    desc: 显示帮助信息
    cmds:
      - task --list

  build:
    desc: 构建所有 workspace crates
    cmds:
      - cargo build --workspace --release

  dev:
    desc: 开发模式构建
    cmds:
      - cargo build --workspace

  test:
    desc: 运行所有测试
    cmds:
      - cargo test --workspace

  test-single:
    desc: 运行单个测试
    vars:
      TEST_NAME: ""
    cmds:
      - cargo test --workspace "{{.TEST_NAME}}"

  run:
    desc: 运行 CLI
    vars:
      GOAL: "测试项目"
    cmds:
      - cargo run -p matrix-cli -- "{{.GOAL}}"

  install:
    desc: 一键安装到全局
    cmds:
      - cargo build -p matrix-cli --release
      - cmd: powershell -Command "New-Item -ItemType Directory -Force -Path $HOME/.local/bin; Copy-Item target/release/matrix.exe -Destination $HOME/.local/bin/matrix.exe -Force; Write-Host \"Installed matrix.exe v{{.VERSION}} to ~/.local/bin/\""
        platforms: [windows]
      - cmd: |
          mkdir -p ~/.local/bin
          cp target/release/matrix ~/.local/bin/matrix
          chmod +x ~/.local/bin/matrix 2>/dev/null || true
          echo "Installed matrix v{{.VERSION}} to ~/.local/bin/"
        platforms: [linux, darwin]
    vars:
      VERSION:
        sh: cargo pkgid -p matrix-cli | sed 's/.*#//' | sed 's/.*@//'

  install-local:
    desc: 安装到用户目录
    cmds:
      - cargo build -p matrix-cli --release
      - cmd: powershell -Command "New-Item -ItemType Directory -Force -Path $HOME/.local/bin; Copy-Item target/release/matrix.exe -Destination $HOME/.local/bin/matrix.exe -Force; Write-Host \"Installed matrix.exe v{{.VERSION}} to ~/.local/bin/\""
        platforms: [windows]
      - cmd: |
          mkdir -p ~/.local/bin
          cp target/release/matrix ~/.local/bin/matrix
          chmod +x ~/.local/bin/matrix 2>/dev/null || true
          echo "Installed matrix v{{.VERSION}} to ~/.local/bin/"
        platforms: [linux, darwin]
    vars:
      VERSION:
        sh: cargo pkgid -p matrix-cli | sed 's/.*#//' | sed 's/.*@//'

  clean:
    desc: 清理构建产物
    cmds:
      - cargo clean

  fmt:
    desc: 格式化代码
    cmds:
      - cargo fmt --all

  lint:
    desc: 运行 clippy 检查
    cmds:
      - cargo clippy --workspace --all-targets -- -D warnings

  check:
    desc: 检查代码
    cmds:
      - cargo check --workspace

  watch:
    desc: 监听文件变化
    cmds:
      - cargo watch -x "build --workspace"