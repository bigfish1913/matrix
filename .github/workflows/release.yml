name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/matrix

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../matrix-v${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.tar.gz matrix

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../matrix-v${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.zip matrix.exe

      - uses: actions/upload-artifact@v4
        with:
          name: matrix-${{ matrix.target }}
          path: matrix-v${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: matrix-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Matrix v${{ steps.version.outputs.VERSION }}
          body: |
            ## Matrix v${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|--------------|------|
            | Linux | x86_64 | `matrix-v${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu.tar.gz` |
            | macOS | Intel | `matrix-v${{ steps.version.outputs.VERSION }}-x86_64-apple-darwin.tar.gz` |
            | macOS | Apple Silicon | `matrix-v${{ steps.version.outputs.VERSION }}-aarch64-apple-darwin.tar.gz` |
            | Windows | x86_64 | `matrix-v${{ steps.version.outputs.VERSION }}-x86_64-pc-windows-msvc.zip` |

            ### Install

            **Linux/macOS:**
            ```bash
            tar -xzf matrix-*.tar.gz
            sudo mv matrix /usr/local/bin/
            ```

            **Windows:**
            Extract the zip file and add `matrix.exe` to your PATH.

            ---

            **Documentation**: https://github.com/bigfish1913/matrix#readme
          files: artifacts/*
          draft: false
          prerelease: false
